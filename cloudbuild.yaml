steps:
  # Build Backend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/whatic/backend:$COMMIT_SHA', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/whatic/backend:latest', './backend']
    env:
      - 'DOCKER_BUILDKIT=1'

  # Push Backend to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/whatic/backend:latest']

  # Build Frontend
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '--build-arg', 'REACT_APP_BACKEND_URL=https://whatic-api-315750790111.us-central1.run.app', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/whatic/frontend:$COMMIT_SHA', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/whatic/frontend:latest', './frontend']
    env:
      - 'DOCKER_BUILDKIT=1'

  # Push Frontend to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/whatic/frontend:latest']

  # Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'whatic-api'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/whatic/backend:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'FRONTEND_URL=https://whatic-frontend-315750790111.us-central1.run.app'

  # Deploy Frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'whatic-frontend'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/whatic/frontend:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'REACT_APP_BACKEND_URL=https://whatic-api-315750790111.us-central1.run.app'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/whatic/backend:latest'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/whatic/frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
